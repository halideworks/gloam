<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gloam mark: red disc cut by a diagonal S-curve. The S is masked out (transparent)
       so it shows the page background through, adapting to the site's light/dark theme. -->
  <mask id="gloam-s">
    <rect width="100" height="100" fill="#fff"/>
    <path d="M15 85 C51.06 74.40 48.94 25.60 85 15" fill="none" stroke="#000"
          stroke-width="13" stroke-linecap="round"/>
  </mask>
  <circle cx="50" cy="50" r="45" fill="#E22B1F" mask="url(#gloam-s)"/>
</svg>
