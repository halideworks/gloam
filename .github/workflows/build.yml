name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build Packages
        shell: powershell
        run: .\package.ps1

      - name: Upload Lite Package
        uses: actions/upload-artifact@v4
        with:
          name: Gloam_Lite
          path: Gloam_Lite.zip

      - name: Upload Full Package
        uses: actions/upload-artifact@v4
        with:
          name: Gloam_Full
          path: Gloam_Full.zip

      - name: Create Tagged Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Gloam_Lite.zip
            Gloam_Full.zip
          draft: false
          prerelease: false

      - name: Update Latest Auto-Build
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: latest
          name: Latest Auto-Build
          files: |
            Gloam_Lite.zip
            Gloam_Full.zip
          draft: false
          prerelease: true
